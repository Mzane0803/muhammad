title: Muhammad
description: Founder · Researcher · Builder

collections:
  writings:
    output: false
  projects:
    output: false
  resume:
    output: false

defaults:
  - scope:
      path: ""
      type: writings
    values:
      published: true
  - scope:
      path: ""
      type: projects
    values:
      published: true
  - scope:
      path: ""
      type: resume
    values:
      published: true

exclude:
  - README.md
  - chats
  - project
  - SKILL.md
  - node_modules
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - netlify.toml
  - vendor

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins: []
