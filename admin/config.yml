backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://mo38.netlify.app/
display_url: https://mo38.netlify.app/
logo_url: /assets/favicon.svg

collections:
  - name: "writings"
    label: "Writing"
    label_singular: "Entry"
    folder: "_writings"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{type}} · {{date | date('YYYY-MM-DD')}} · {{title}}"
    sortable_fields: ['date', 'title', 'type']
    view_filters:
      - label: "Essays"
        field: type
        pattern: "Essay"
      - label: "Poetry"
        field: type
        pattern: "Poetry"
      - label: "Papers"
        field: type
        pattern: "Paper"
    fields:
      - { label: "Show on site (MUST be ON for the post to appear publicly — drafts stay hidden)", name: "published", widget: "boolean", default: true, hint: "Toggle OFF to save as a private draft. Toggle ON to publish to the live site." }
      - { label: "Type", name: "type", widget: "select", options: ["Essay", "Poetry", "Paper"], default: "Essay" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - { label: "Reading time (e.g. '9 min read')", name: "read_time", widget: "string", required: false }
      - { label: "Short description (one sentence, shown in the archive)", name: "description", widget: "text" }
      - { label: "Dek (optional italic subhead under the title)", name: "dek", widget: "text", required: false }
      - { label: "Filed under (tags)", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Cover image (optional, shown at top of essay)", name: "cover_image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "_projects"
    create: true
    slug: "{{order}}-{{slug}}"
    summary: "{{name}} · {{status}}"
    sortable_fields: ['order', 'name']
    fields:
      - { label: "Show on site (MUST be ON to appear publicly)", name: "published", widget: "boolean", default: true, hint: "Toggle OFF to hide this project." }
      - { label: "Order (lower number = higher on page)", name: "order", widget: "number", default: 1, value_type: "int" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["Active", "Shipped", "Archived"], default: "Active" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Stack (tech tags)", name: "stack", widget: "list", default: [] }
      - { label: "External URL (optional, makes name clickable)", name: "url", widget: "string", required: false }
      - { label: "Notes (optional, not shown on site)", name: "body", widget: "markdown", required: false }

  - name: "resume"
    label: "Resume Entries"
    label_singular: "Entry"
    folder: "_resume"
    create: true
    slug: "{{order}}-{{slug}}"
    summary: "{{period}} · {{role}} · {{organization}}"
    sortable_fields: ['order', 'period']
    fields:
      - { label: "Show on site (MUST be ON to appear publicly)", name: "published", widget: "boolean", default: true, hint: "Toggle OFF to hide this entry." }
      - { label: "Order (lower number = higher on page)", name: "order", widget: "number", default: 1, value_type: "int" }
      - { label: "Period (e.g. '2025 to Present')", name: "period", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Organization", name: "organization", widget: "string" }
      - { label: "Description (one or two sentences)", name: "description", widget: "text" }
      - { label: "Notes (optional, not shown)", name: "body", widget: "markdown", required: false }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "SEO · Nav · Hero · About · Contact · Pinned"
        file: "_data/site.yml"
        fields:
          - label: "SEO (search engines, link previews)"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page title (browser tab)", name: "title", widget: "string", default: "Muhammad" }
              - { label: "Meta description (shown in Google, link previews)", name: "description", widget: "text" }
              - { label: "Open Graph image (1200x630 PNG/JPG recommended — shown on link previews)", name: "og_image", widget: "image", required: false }
          - label: "Navigation labels"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Home", name: "home", widget: "string", default: "Home" }
              - { label: "Writing", name: "writing", widget: "string", default: "Writing" }
              - { label: "Projects", name: "projects", widget: "string", default: "Projects" }
              - { label: "Resume", name: "resume", widget: "string", default: "Resume" }
              - { label: "About", name: "about", widget: "string", default: "About" }
              - { label: "Contact", name: "contact", widget: "string", default: "Contact" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline (above name)", name: "tagline", widget: "string" }
              - { label: "Name / display title", name: "name", widget: "string" }
              - { label: "Description paragraphs", name: "description", widget: "list", field: { label: "Paragraph", name: "text", widget: "string" } }
          - { label: "Domains (tags shown on homepage)", name: "domains", widget: "list" }
          - label: "Pinned (optional homepage module shown between Resume and About)"
            name: "pinned"
            widget: "object"
            fields:
              - { label: "Show on site", name: "enabled", widget: "boolean", default: false, hint: "Toggle ON to display this block on the homepage." }
              - { label: "Section label", name: "label", widget: "string", default: "Pinned" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Body (markdown)", name: "body", widget: "markdown", required: false }
              - { label: "Link URL (optional)", name: "url", widget: "string", required: false }
          - label: "About section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Paragraph 1", name: "paragraph_1", widget: "text" }
              - { label: "Paragraph 2", name: "paragraph_2", widget: "text" }
              - { label: "Pullquote (middle, italic)", name: "pullquote", widget: "text" }
              - { label: "Paragraph 3", name: "paragraph_3", widget: "text" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Blurb (shown above the links)", name: "blurb", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
              - { label: "VSCO URL", name: "vsco", widget: "string" }
              - { label: "Instagram URL", name: "instagram", widget: "string" }
