about:
  paragraph_1: "I moved to Canada to study at Western University. My work sits at the intersection of AI, financial markets, and philosophy. I'm drawn to the questions that don't resolve cleanly."
  paragraph_2: "I write about consciousness, identity, impermanence, and the nature of the self, drawing on Buddhist teachings, neuroscience, physics, and direct experience. I believe the most important ideas live at the borders between disciplines."
  pullquote: "Living, fighting, and loving in a fat tailed world."
  paragraph_3: "Outside of work, I'm an amateur Muay Thai fighter, poker player, and salsa dancer. I'm an avid reader with a strong interest in physics and philosophy. I speak English and Urdu, and I'm currently learning French."

